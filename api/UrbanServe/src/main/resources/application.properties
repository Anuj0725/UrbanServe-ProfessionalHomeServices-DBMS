spring.application.name=UrbanServe-api

# Database connection — using the dedicated app_backend role, not your admin login
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Server port (default 8080 — change if something else is using it)
server.port=${PORT:8080}

# Logging — shows the actual SQL JdbcTemplate sends, useful while learning/debugging
logging.level.org.springframework.jdbc=DEBUG